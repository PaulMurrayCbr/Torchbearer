<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1"
          name="viewport">

    <title>Torchbearer</title>

    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<template id="torch-template">
    <div class="torch-container">
        <img alt="torch" class="torch0" src="images/torch0.png">
        <img alt="torch" class="torch1" src="images/torch1.png">
        <img alt="torch" class="torch2" src="images/torch2.png">
        <img alt="torch" class="torch3" src="images/torch3.png">
    </div>
</template>

<template id="toast-template">
    <div class="toast"></div>
</template>

<div id="app">
    <div id="splash-container">
        <img alt="splash" id="splash" src="images/splash.png">
    </div>
    <div id="splash-fade"></div>

    <header id="toolbar">
        <img alt="Torchbearer" id="title" src="images/LOGO-with-text.png" style="max-height: 2rem;">
        <span id="buttons">
            <button id="addTorch">🔥</button>


<div class="dropdown" id="time-passes-container">
            <button id="time-passes">⌛</button>

    <div class="dropdown-menu" id="time-passes-dropdown">
        <div class="title">Time passes &hellip;</div>
        <button class="minutes-pass" data-min="60">1 hr</button>
        <button class="minutes-pass" data-min="10">10 min</button>
        <button class="minutes-pass" data-min="1">1 min</button>
    </div>
</div>


            <button id="pause">❚❚</button>
        </span>
    </header>

    <main id="torches">
        <div class="help fader" id="start-hint">Tap the flame to add a torch.</div>
        <div class="visible" id="darkness">DARKNESS</div>
        <div id="toaster">
        </div>
        <div class="hidden" id="paused"></div>
        <div id="torches-grid">
        </div>
    </main>

    <nav class="help fader hidden" id="help">
        Tap torch to select.<br>
        Double or long tap to ignite/extinguish.
    </nav>

    <footer class="" id="panel-container">
        <div class="dialog" id="panel">
            <span class="title">Torch Options</span>
            <span class="close-button dialog" id="close-panel">×</span>
            <div id="time-remaining"></div>
            <div class="button-row" id="action-button-container">
                <button id="ignite-torch">🔥 Ignite</button>
                <button class="disabled" id="extinguish-torch">💨 Extinguish</button>
                <button id="recharge-torch">↻ Recharge</button>
                <button id="discard-torch">✕ Discard</button>
            </div>
            <div class="button-row" id="minute-button-container">
                <button class="set-minutes" data-min="120">2 hr</button>
                <button class="set-minutes" data-min="60">1 hr</button>
                <button class="set-minutes" data-min="30">30 min</button>
                <button class="set-minutes" data-min="10">10 min</button>
                <button class="set-minutes" data-min="5">5 min</button>
                <button class="set-minutes" data-min="1">1 min</button>
            </div>
        </div>
    </footer>
</div>

<script src="js/main.js" type="module"></script>
</body>
</html>
