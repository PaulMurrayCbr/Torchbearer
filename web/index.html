<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1"
          name="viewport">

    <title>Torchbearer</title>

    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<div id="app">
    <header id="toolbar">
        <span id="title">Torchbearer</span>
        <span id="buttons">
            <button id="addTorch">🔥</button>
            <button id="pause">❚❚</button>
        </span>
    </header>

    <main id="torches">
        <div id="darkness" class="visible">DARKNESS</div>
        <div id="paused" class="hidden"></div>

        <div id="torches-grid">
                    <img class="torch" src="images/torch0.png" alt="torch">
            <!--
                    <img class="torch selected" src="images/torch1.png" alt="torch">
                    <img class="torch" src="images/torch2.png" alt="torch">
                    <img class="torch" src="images/torch3.png" alt="torch">
                    -->
        </div>
    </main>

    <nav id="help" >
                Click torch to ignite/extinguish.<br>
        Long or double click for options.
    </nav>

    <footer id="panel" class="dialog">
        <span class="title">Torch Options</span>
        <span class="close-button dialog">×</span>
        <div id="time-remaining">About 15 min remaining</div>
        <button id="discard-torch">✕ Discard</button>
        <button id="recharge-torch">↻ Recharge</button>
        <button id="edit-time">⏱ Edit time</button>

    </footer>
</div>

<script src="js/main.js" type="module"></script>
</body>
</html>
