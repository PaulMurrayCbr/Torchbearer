<html lang="en">

    <title>Torchbearer</title>

    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <header id="toolbar">

        <span id="buttons">
            <button id="addTorch">🔥</button>
            <button id="pause">❚❚</button>

    <main id="torches">
        <div id="darkness" class="visible">DARKNESS</div>

        <img class="torch" src="images/torch2.png" alt="torch">
        <img class="torch" src="images/torch3.png" alt="torch">
        -->
    </main>

    <nav id="help" >
                Click torch to ignite/extinguish.<br>
        Long or double click for options.
    </nav>

    <footer id="panel" class="dialog">

        here is a panel

    </footer>


</div>
